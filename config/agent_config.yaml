# Agent Configuration
agent:
  name: "K8s-Consul Troubleshooting Agent"
  version: "0.1.0"
  description: "AI agent for troubleshooting Kubernetes and Consul service mesh issues"

# LLM Configuration
llm:
  provider: "openai"
  model: "gpt-4-turbo-preview"
  temperature: 0.1
  max_tokens: 2000

# Tool Configuration
tools:
  kubernetes:
    enabled: true
    timeout: 30
    max_retries: 3
  
  consul:
    enabled: true
    timeout: 30
    max_retries: 3

# Agent Behavior
behavior:
  max_iterations: 10
  early_stopping_method: "generate"
  handle_parsing_errors: true
  verbose: false

# Troubleshooting Patterns
patterns:
  kubernetes:
    - "CrashLoopBackOff"
    - "ImagePullBackOff"
    - "Pending"
    - "OOMKilled"
    - "Error"
  
  consul:
    - "Service registration failed"
    - "Health check failing"
    - "Sidecar proxy not ready"
    - "Intention denied"
    - "Certificate validation failed"

